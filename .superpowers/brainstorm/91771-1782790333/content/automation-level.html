<h2>你希望章节发布工具做到哪种程度？</h2>
<p class="subtitle">先选目标自动化程度，后面我们再细化章节来源、登录方式、发布节奏和异常处理。</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>半自动辅助发布</h3>
      <p>工具管理小说和章节，帮你复制标题、正文并记录发布状态；最后你自己粘贴到番茄后台。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>浏览器自动填写</h3>
      <p>工具打开番茄作者后台，自动填标题和正文；你检查无误后点发布，控制权还在你手里。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>全自动批量发布</h3>
      <p>选择小说和章节范围后，工具逐章填写并提交；出错、验证码或审核风险时暂停提醒。</p>
    </div>
  </div>
</div>
